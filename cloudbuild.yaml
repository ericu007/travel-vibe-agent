steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/travel-vibe-agent', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/travel-vibe-agent']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'travel-vibe-agent'
      - '--image=gcr.io/$PROJECT_ID/travel-vibe-agent'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--port=8080'